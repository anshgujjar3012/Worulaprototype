<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Information - Bhartiya Kisan Union</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .header {
            background-color: #4a80dc;
            color: white;
            padding: 30px 20px 60px 20px;
            text-align: left;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .profile-card {
            background: white;
            margin: -40px 20px 20px 20px;
            border-radius: 15px;
            padding: 25px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: relative;
            border: 1px solid #eef2f7;
        }

        .card-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .info-section {
            flex: 1;
            padding-right: 15px;
        }

        .name-container {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .verified-icon {
            color: #4a80dc;
            font-size: 16px;
        }

        .title {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .image-section {
            position: relative;
        }

        .profile-img {
            width: 85px;
            height: 115px;
            object-fit: cover;
            border-radius: 50% / 40%;
            border: 2px solid #5cb85c;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .details-list {
            list-style: none;
            margin-top: 15px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }

        .detail-item i {
            margin-right: 12px;
            margin-top: 3px;
            width: 16px;
            text-align: center;
        }

        .icon-phone { color: #4a80dc; }
        .icon-email { color: #5cb85c; }
        .icon-father { color: #4a80dc; }
        .icon-address { color: #b93e3e; }

        .detail-item a {
            color: #333;
            text-decoration: none;
        }
        
        .detail-item a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            text-align: center;
            margin-top: 40px;
            color: #ccc;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Member Information</h1>
    </div>

    <div class="profile-card">
        <div class="card-flex">
            <div class="info-section">
                <div class="name-container">
                    <h2 class="name">Manmeet Chaudhary</h2>
                    <i class="fa-solid fa-circle-check verified-icon"></i>
                </div>
                <div class="title">Member</div>
            </div>
            
            <div class="image-section">
                <img class="profile-img" src="https://via.placeholder.com/150" alt="Manmeet Chaudhary">
            </div>
        </div>

        <ul class="details-list">
            <li class="detail-item">
                <i class="fa-solid fa-phone icon-phone"></i>
                <a href="tel:9915252671">9915252671</a>
            </li>
            <li class="detail-item">
                <i class="fa-solid fa-envelope icon-email"></i>
                <a href="mailto:manmeetchaudhary71@gmail.com">manmeetchaudhary71@gmail.com</a>
            </li>
            <li class="detail-item">
                <i class="fa-solid fa-user-group icon-father"></i>
                <span><strong>Father's name:</strong> Om Nath</span>
            </li>
            <li class="detail-item">
                <i class="fa-solid fa-earth-americas icon-address"></i>
                <span>Village surapur post office kathgarh,<br>Shahid Bhagat Singh Nagar<br>(Nawanshahr), Punjab - 144522</span>
            </li>
        </ul>
    </div>

    <div class="footer-logo">
        BHARTIYA KISAN UNION
    </div>
</div>

</body>
</html>
